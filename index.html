<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>12 Главк — Система Управления</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            overflow-x: hidden;
            padding: 16px;
        }

        /* Премиальная шапка приложения */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Карточки с данными и графиками */
        .card {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px;
            color: #9ca3af;
            text-transform: uppercase;
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* Поля ввода (Интерфейс анкеты/отчетов) */
        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 4px;
        }

        .input-control {
            width: 100%;
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-control:focus {
            border-color: #38bdf8;
        }

        /* Кнопки, которые "продают" приложение */
        .btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #1f2937;
            border: 1px solid #374151;
            color: #e5e7eb;
            margin-top: 8px;
            box-shadow: none;
        }

        /* Индикаторы статуса */
        .status-badge {
            display: inline-block;
            background-color: #064e3b;
            color: #34d399;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <!-- Шапка системы -->
    <div class="header">
        <h1>СУБД "ПЕРСОНА"</h1>
        <p>Модуль автоматизации и аналитики данных</p>
        <div class="status-badge">Автономный режим активен</div>
    </div>

    <!-- Блок ввода/поиска кандидатов -->
    <div class="card">
        <div class="card-title">Панель учета данных</div>
        
        <div class="input-group">
            <label for="candidate-name">Идентификатор объекта / ФИО</label>
            <input type="text" id="candidate-name" class="input-control" placeholder="Введите данные для анализа...">
        </div>

        <div class="input-group">
            <label for="region-select">Региональная рабочая группа</label>
            <select id="region-select" class="input-control">
                <option value="Тверь">Тверская область</option>
                <option value="Тула">Тульская область</option>
                <option value="Липецк">Липецкая область</option>
                <option value="Нижний Новгород">Нижегородская область</option>
            </select>
        </div>

        <button class="btn" onclick="processData()">Синхронизировать отчет</button>
        <button class="btn btn-secondary" onclick="clearForm()">Очистить локальный кэш</button>
    </div>

    <!-- Скрипт связи с ядром Android -->
    <script>
        // Функция обработки и отправки данных
        function processData() {
            const inputData = document.getElementById('candidate-name').value;
            const region = document.getElementById('region-select').value;

            if (!inputData.trim()) {
                // Если поле пустое, дергаем системный тост Android со звуком/вибро
                sendToAndroid("Ошибка: Поле ввода не должно быть пустым!");
                return;
            }

            // Имитация успешной обработки СУБД
            sendToAndroid(`Успешно: Данные для региона [${region}] внесены в локальную базу.`);
        }

        function clearForm() {
            document.getElementById('candidate-name').value = '';
            sendToAndroid("Локальная форма успешно очищена");
        }

        // Безопасный вызов моста: если приложение запущено в браузере — сработает alert,
        // если скомпилировано в APK — сработает красивое нативное уведомление Android
        function sendToAndroid(message) {
            if (typeof AndroidBridge !== "undefined" && AndroidBridge.showSystemToast) {
                AndroidBridge.showSystemToast(message);
            } else {
                alert(message);
            }
        }
    </script>
</body>
</html>
