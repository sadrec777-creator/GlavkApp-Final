<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>12 Главк</title>
    <style>
        :root {
            --bg-color: #050b14;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-color: #f3f4f6;
            --accent-color: #38bdf8;
            --card-shadow: rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg-color: #f0f4f8;
            --glass-bg: rgba(0, 0, 0, 0.03);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-color: #1e293b;
            --accent-color: #0284c7;
            --card-shadow: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            transition: background 0.3s, color 0.3s;
            background-image: radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.05) 0%, transparent 80%);
        }

        /* Эффект жидкого стекла */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px 0 var(--card-shadow);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1, h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-color);
        }

        h2 {
            font-size: 16px;
            margin-bottom: 14px;
            text-transform: uppercase;
            color: var(--accent-color);
        }

        .theme-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            color: var(--text-color);
            opacity: 0.8;
        }

        .input-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
        }

        .btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            margin-top: 8px;
        }

        .btn-link {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .result-box {
            margin-top: 10px;
            font-weight: 600;
            color: var(--accent-color);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="glass-card header">
        <div>
            <h1>12 Главк</h1>
            <p style="font-size:11px; opacity:0.6;">Мобильный комплекс</p>
        </div>
        <button class="theme-btn" onclick="toggleTheme()">Смена темы</button>
    </div>

    <div id="auth-screen" class="glass-card">
        <h2>Авторизация профиля</h2>
        <div class="input-group">
            <label>Личный номер / Логин</label>
            <input type="text" id="login" class="input-control" placeholder="Идентификатор">
        </div>
        <button class="btn" onclick="login()">Войти</button>
    </div>

    <div id="main-content" class="hidden">

        <div class="glass-card">
            <h2>Калькулятор ДД</h2>
            <div class="input-group">
                <label>Оклад по воинскому званию (руб)</label>
                <input type="number" id="dd-zv" class="input-control" value="0">
            </div>
            <div class="input-group">
                <label>Оклад по воинской должности (руб)</label>
                <input type="number" id="dd-dolzh" class="input-control" value="0">
            </div>
            <div class="input-group">
                <label>Надбавка за выслугу лет (%)</label>
                <input type="number" id="dd-vysl" class="input-control" value="0">
            </div>
            <button class="btn" onclick="calcDD()">Рассчитать ДД</button>
            <div id="dd-result" class="result-box"></div>
        </div>

        <div class="glass-card">
            <h2>Калькулятор ФИЗО</h2>
            <div class="input-group">
                <label>Баллы за 1-е упражнение</label>
                <input type="number" id="fizo1" class="input-control" value="0">
            </div>
            <div class="input-group">
                <label>Баллы за 2-е упражнение</label>
                <input type="number" id="fizo2" class="input-control" value="0">
            </div>
            <div class="input-group">
                <label>Баллы за 3-е упражнение</label>
                <input type="number" id="fizo3" class="input-control" value="0">
            </div>
            <button class="btn" onclick="calcFizo()">Итог по ФИЗО</button>
            <div id="fizo-result" class="result-box"></div>
        </div>

        <div class="glass-card">
            <h2>Календарь и пометки</h2>
            <div class="input-group">
                <label>Выберите дату</label>
                <input type="date" id="cal-date" class="input-control">
            </div>
            <div class="input-group">
                <label>Заметка на этот день</label>
                <input type="text" id="cal-text" class="input-control" placeholder="Текст заметки">
            </div>
            <button class="btn" onclick="saveNote()">Сохранить пометку</button>
            <button class="btn btn-secondary" style="background:transparent; border:1px solid var(--glass-border);" onclick="showNote()">Посмотреть заметку</button>
            <div id="cal-result" class="result-box"></div>
        </div>

        <div class="glass-card">
            <h2>Расчет выслуги лет</h2>
            <div class="input-group">
                <label>Дата начала службы</label>
                <input type="date" id="vysl-start" class="input-control">
            </div>
            <button class="btn" onclick="calcVysluga()">Рассчитать выслугу</button>
            <div id="vysl-result" class="result-box"></div>
        </div>

        <div class="glass-card">
            <h2>Обратная связь</h2>
            <div class="input-group">
                <label>ФИО кандидата / Текст обращения</label>
                <textarea id="feedback-text" class="input-control" rows="3" placeholder="Введите информацию..."></textarea>
            </div>
            <button class="btn" onclick="sendMail('Жалоба')">Отправить жалобу</button>
            <button class="btn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);" onclick="sendMail('Анкета кандидата')">Отправить анкету</button>
        </div>

        <div class="glass-card">
            <h2>Официальные ресурсы</h2>
            <a href="https://vk.ru/12mil" class="btn-link" target="_blank">Перейти в VK</a>
            <a href="https://max.ru/sila" class="btn-link" target="_blank">Перейти в MAX</a>
            <a href="https://mil.ru/service/contract12" class="btn-link" target="_blank">Сайт (Служба по контракту)</a>
        </div>

    </div>

    <script>
        // Смена темы
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
        }

        // Авторизация
        function login() {
            const user = document.getElementById('login').value;
            if(user.trim() !== "") {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            }
        }

        // Расчет ДД
        function calcDD() {
            const zv = parseFloat(document.getElementById('dd-zv').value) || 0;
            const dolzh = parseFloat(document.getElementById('dd-dolzh').value) || 0;
            const vyslPct = parseFloat(document.getElementById('dd-vysl').value) || 0;
            
            const base = zv + dolzh;
            const total = base + (base * (vyslPct / 100));
            document.getElementById('dd-result').innerText = `Примерное ДД (без НДФЛ): ${total.toFixed(2)} руб.`;
        }

        // Расчет ФИЗО
        function calcFizo() {
            const f1 = parseInt(document.getElementById('fizo1').value) || 0;
            const f2 = parseInt(document.getElementById('fizo2').value) || 0;
            const f3 = parseInt(document.getElementById('fizo3').value) || 0;
            const total = f1 + f2 + f3;
            
            let grade = "Не сдано";
            if(total >= 180) grade = "Высший уровень";
            else if(total >= 160) grade = "1-й уровень";
            else if(total >= 120) grade = "2-й уровень";

            document.getElementById('fizo-result').innerText = `Всего баллов: ${total} (${grade})`;
        }

        // Календарь
        function saveNote() {
            const date = document.getElementById('cal-date').value;
            const text = document.getElementById('cal-text').value;
            if(date && text) {
                localStorage.setItem('note_' + date, text);
                document.getElementById('cal-result').innerText = "Пометка сохранена!";
            }
        }
        function showNote() {
            const date = document.getElementById('cal-date').value;
            if(date) {
                const note = localStorage.getItem('note_' + date) || "Нет пометок на эту дату";
                document.getElementById('cal-result').innerText = note;
            }
        }

        // Выслуга лет
        function calcVysluga() {
            const startStr = document.getElementById('vysl-start').value;
            if(!startStr) return;
            const start = new Date(startStr);
            const now = new Date();
            const diffTime = Math.abs(now - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const years = Math.floor(diffDays / 365);
            const months = Math.floor((diffDays % 365) / 30);
            
            document.getElementById('vysl-result').innerText = `Выслуга календарная: ${years} л., ${months} мес.`;
        }

        // Отправка писем через встроенный почтовик
        function sendMail(subject) {
            const text = document.getElementById('feedback-text').value;
            const email = "rburov97@yandex.ru";
            if(!text.trim()) return;
            
            // Открывает системное почтовое приложение с готовыми полями
            window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(text)}`;
        }
    </script>
</body>
</html>
